<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Atlético Nacional</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-96">
        <h2 class="text-2xl font-bold text-center text-green-700 mb-6">
            Crear Cuenta 💚
        </h2>

        <form id="registerForm">
            <input 
                type="text" 
                id="nombre" 
                placeholder="Nombre"
                class="w-full mb-3 p-2 border rounded-lg"
                required
            >

            <input 
                type="email" 
                id="email" 
                placeholder="Email"
                class="w-full mb-3 p-2 border rounded-lg"
                required
            >

            <input 
                type="password" 
                id="password" 
                placeholder="Contraseña"
                class="w-full mb-4 p-2 border rounded-lg"
                required
            >

            <button 
                type="submit"
                class="w-full bg-green-600 text-white p-2 rounded-lg hover:bg-green-700"
            >
                Registrarse
            </button>
        </form>

        <p class="text-center mt-4 text-sm">
            ¿Ya tienes cuenta?
            <a href="/login" class="text-green-600 font-bold">Inicia sesión</a>
        </p>
    </div>

<script>
document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const nombre = document.getElementById("nombre").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const response = await fetch("/api/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ nombre, email, password })
    });

    const data = await response.json();

    if (response.ok) {
        alert("Usuario registrado 💚");
        window.location.href = "/login";
    } else {
        alert(data.error);
    }
});
</script>

</body>
</html>
