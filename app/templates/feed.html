<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GolClub ⚽</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="phone-container">
    <div class="feed" id="feed"></div>
    <div class="phone-container">
<body>

<div class="phone-container">

    <!-- NOTCH -->
    <div class="notch"></div>

    <!-- FEED -->
    <div class="feed" id="feed"></div>

    <!-- BOTÓN SUBIR -->
    <button class="upload-btn" id="openModalBtn">+</button>

    <!-- BARRA INFERIOR -->
    <div class="bottom-bar">
        <div>🏠</div>
        <div>🔍</div>
        <div>➕</div>
        <div>❤️</div>
        <div>👤</div>
    </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h2>Subir Gol ⚽</h2>

        <form id="videoForm" enctype="multipart/form-data">
            <input type="text" name="titulo" placeholder="Título" required>
            <input type="text" name="partido" placeholder="Partido" required>
            <input type="number" name="minuto" placeholder="Minuto" required>

            <select name="categoria">
                <option>Libertadores</option>
                <option>Clasicos</option>
                <option>Historicos</option>
            </select>

            <input type="file" name="video" accept="video/*" required>

            <button type="submit">Subir</button>
        </form>
    </div>
</div>
</body>
</html>
