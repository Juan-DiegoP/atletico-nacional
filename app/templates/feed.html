<!DOCTYPE html>
<html>
<head>
    <title>GolClub ⚽</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="feed" id="feed"></div>

<!-- BOTÓN FLOTANTE -->
<button class="upload-btn" id="openModalBtn">＋</button>

<!-- MODAL SUBIR VIDEO -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h2>Subir Gol ⚽</h2>

        <form id="videoForm" enctype="multipart/form-data">
            <input type="text" name="titulo" placeholder="Título" required>
            <input type="text" name="partido" placeholder="Partido" required>
            <input type="number" name="minuto" placeholder="Minuto" required>
            
            <select name="categoria">
                <option>Libertadores</option>
                <option>Clasicos</option>
                <option>Historicos</option>
            </select>

            <input type="file" name="video" accept="video/*" required>

            <button type="submit">Subir</button>
            <button type="button" onclick="cerrarModal()">Cancelar</button>
        </form>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const feed = document.getElementById("feed");
    const modal = document.getElementById("modal");
    const openBtn = document.getElementById("openModalBtn");
    const form = document.getElementById("videoForm");

    // CARGAR VIDEOS
    async function cargarVideos() {
        const response = await fetch("/api/videos");
        const videos = await response.json();

        feed.innerHTML = "";

        videos.forEach(video => {
            const card = document.createElement("div");
            card.classList.add("video-card");

            card.innerHTML = `
                <video src="${video.video_url}" autoplay muted loop></video>
                <div class="info">
                    <h3>⚽ ${video.titulo}</h3>
                    <p>🏟 ${video.partido}</p>
                    <p>⏱ Min ${video.minuto}</p>
                    <p>👤 ${video.autor}</p>
                </div>
            `;

            feed.appendChild(card);
        });
    }

    cargarVideos();

    // ABRIR MODAL
    openBtn.addEventListener("click", () => {
        modal.style.display = "flex";
    });

    // CERRAR MODAL AL HACER CLICK FUERA
    modal.addEventListener("click", (e) => {
        if (e.target === modal) {
            modal.style.display = "none";
        }
    });

    // SUBIR VIDEO
    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const token = localStorage.getItem("token");
        const formData = new FormData(form);

        const response = await fetch("/api/videos", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + token
            },
            body: formData
        });

        const data = await response.json();
        alert(data.mensaje || data.error);

        modal.style.display = "none";
        cargarVideos();
    });

});
</script>

</body>
</html>
